_schema-version: 3.3.0
ID: vendor-invoice-management-system
version: 1.0.0
description: "Vendor Invoice Management System using SAP CAPM"
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: vendor-invoice-management-system-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: vendor-invoice-management-system-auth
      - name: vendor-invoice-management-system-db
      - name: vendor-invoice-management-system-destination

  - name: vendor-invoice-management-system-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: vendor-invoice-management-system-db
  - name: vendor-invoice-management-system
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: vendor-invoice-management-system-auth
      - name: vendor-invoice-management-system-html5-runtime
      - name: vendor-invoice-management-system-destination
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

  - name: vendor-invoice-management-system-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: vendorinvoicemanagementsysteminvoiceapp
          artifacts:
            - invoiceapp.zip
          target-path: app/
        - name: vendorinvoicemanagementsystemportalapp
          artifacts:
            - portalapp.zip
          target-path: app/
        - name: vendorinvoicemanagementsystemvendorapp
          artifacts:
            - vendorapp.zip
          target-path: app/
    requires:
      - name: vendor-invoice-management-system-auth
      - name: srv-api
      - name: vendor-invoice-management-system-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true

  - name: vendorinvoicemanagementsysteminvoiceapp
    type: html5
    path: app/invoiceapp
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: vendorinvoicemanagementsystemportalapp
    type: html5
    path: app/portalapp
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: vendorinvoicemanagementsystemvendorapp
    type: html5
    path: app/vendorapp
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

resources:
  - name: vendor-invoice-management-system-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: vendor-invoice-management-system-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
        role-collections:
          - name: 'Admin (vendor-invoice-management-system ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Admin'
          - name: 'Approver (vendor-invoice-management-system ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Approver'
          - name: 'VendorManager (vendor-invoice-management-system ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.VendorManager'
          - name: 'Viewer (vendor-invoice-management-system ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Viewer'
    requires:
      - name: app-api
  - name: vendor-invoice-management-system-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: vendor-invoice-management-system-destination
    type: org.cloudfoundry.managed-service
    requires:
      - name: srv-api
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                Description: CAP service for vendor invoice management
                URL: ~{srv-api/srv-url}
                Type: HTTP
                ProxyType: Internet
                Authentication: NoAuthentication
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true

  - name: vendor-invoice-management-system-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: vendor-invoice-management-system-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime